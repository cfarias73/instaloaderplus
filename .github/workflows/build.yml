name: Build Executables

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flask requests browser-cookie3 pyinstaller

    - name: Build with PyInstaller (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        pyinstaller --onefile --add-data "templates;templates" --add-data "static;static" --name "InstaloaderPlus" app.py
      # Note: Windows uses ; as separator for --add-data

    - name: Build with PyInstaller (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        pyinstaller --onefile --add-data "templates:templates" --add-data "static:static" --name "InstaloaderPlus" app.py
      # Note: Mac uses : as separator for --add-data

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: InstaloaderPlus-${{ matrix.os }}
        path: |
          dist/InstaloaderPlus.exe
          dist/InstaloaderPlus
